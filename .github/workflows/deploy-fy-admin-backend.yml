name: Deploy FY Admin Backend

on:
  push:
    branches: [main]
    paths:
      - 'FutureYou/adminWebsite/backend/**'
      - 'FutureYou/fetchFYAnnualLeave.py'
      - 'FutureYou/bullhorn/talentMapping/**'
      - 'xeroAuthHelper.py'
      - 'xeroAuth.py'
  workflow_dispatch:

env:
  PROJECT_ID: futureyou-458212
  REGION: australia-southeast1
  REPO: futureyou-images
  SERVICE: fy-admin-backend

permissions:
  id-token: write   # Required for WIF
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.FY_WIF_PROVIDER }}
          service_account: ${{ vars.FY_WIF_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Build context is repo root so the Dockerfile can access files across the repo
      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/fy-admin-backend:${{ github.sha }}"
          docker build \
            -f FutureYou/adminWebsite/backend/Dockerfile \
            -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/fy-admin-backend:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image $IMAGE \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "GH_PAT=${{ secrets.GH_PAT }}" \
            --set-env-vars "FUTUREYOU_RECRUITMENT_CLIENT_ID=${{ secrets.FUTUREYOU_RECRUITMENT_CLIENT_ID }}" \
            --set-env-vars "FUTUREYOU_RECRUITMENT_CLIENT_SECRET=${{ secrets.FUTUREYOU_RECRUITMENT_CLIENT_SECRET }}" \
            --set-env-vars "FUTUREYOU_FORECAST_SECRET_KEY=${{ secrets.FUTUREYOU_FORECAST_SECRET_KEY }}"

name: FlightRisk Draft Invoice and Bill Approver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  FR-draft-invoice-bill-approver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r FlightRisk/requirements.txt

      - name: Run FlightRisk Draft Invoice Approver
        working-directory: FlightRisk
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

          FLIGHT_RISK_CLIENT_ID: ${{ secrets.FLIGHT_RISK_CLIENT_ID }}
          FLIGHT_RISK_CLIENT_SECRET: ${{ secrets.FLIGHT_RISK_CLIENT_SECRET }}
          FLIGHT_RISK_API_ID: ${{ secrets.FLIGHT_RISK_API_ID }}
          FLIGHT_RISK_API_KEY: ${{ secrets.FLIGHT_RISK_API_KEY }}

          XERO_REFRESH_TOKEN_FLIGHT_RISK: ${{ vars.XERO_REFRESH_TOKEN_FLIGHT_RISK }}
        run: |
          python draftInvoiceApprover.py

      - name: Send job summary to dashboard
        if: always()
        continue-on-error: true
        env:
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          python3 -c "
          import os, json, urllib.request
          path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not path or not os.path.isfile(path):
              exit(0)
          with open(path) as f:
              summary = f.read().strip()
          if not summary:
              exit(0)
          payload = json.dumps({'run_id': int(os.environ['GITHUB_RUN_ID']), 'run_number': int(os.environ['GITHUB_RUN_NUMBER']), 'workflow_file': 'flightRiskDraftInvoices.yml', 'summary': summary}).encode()
          req = urllib.request.Request(os.environ['BACKEND_API_URL'] + '/store-summary', data=payload, headers={'Content-Type': 'application/json', 'X-API-Key': os.environ['BACKEND_API_KEY']}, method='POST')
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          "


name: FlightRisk Draft Invoice and Bill Approver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  FR-draft-invoice-bill-approver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r FlightRisk/requirements.txt

      - name: Run FlightRisk Draft Invoice Approver
        working-directory: FlightRisk
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

          FLIGHT_RISK_CLIENT_ID: ${{ secrets.FLIGHT_RISK_CLIENT_ID }}
          FLIGHT_RISK_CLIENT_SECRET: ${{ secrets.FLIGHT_RISK_CLIENT_SECRET }}
          FLIGHT_RISK_API_ID: ${{ secrets.FLIGHT_RISK_API_ID }}
          FLIGHT_RISK_API_KEY: ${{ secrets.FLIGHT_RISK_API_KEY }}

          XERO_REFRESH_TOKEN_FLIGHT_RISK: ${{ vars.XERO_REFRESH_TOKEN_FLIGHT_RISK }}
        run: |
          python draftInvoiceApprover.py

      - name: Store job summary
        if: always()
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ] && [ -n "$BACKEND_URL" ]; then
            python3 -c "
import json, os, urllib.request
summary = open(os.environ['GITHUB_STEP_SUMMARY']).read().strip()
if not summary:
    print('No summary to store')
    exit(0)
payload = json.dumps({
    'run_id': int(os.environ.get('GITHUB_RUN_ID', 0)),
    'run_number': int(os.environ.get('GITHUB_RUN_NUMBER', 0)),
    'workflow_file': 'flightRiskDraftInvoices.yml',
    'summary': summary,
}).encode()
req = urllib.request.Request(
    os.environ['BACKEND_URL'] + '/store-summary',
    data=payload,
    headers={'Content-Type': 'application/json', 'X-API-Key': os.environ['BACKEND_API_KEY']},
    method='POST',
)
try:
    with urllib.request.urlopen(req, timeout=10) as resp:
        print('Summary stored:', resp.read().decode())
except Exception as e:
    print('Warning: Failed to store summary:', e)
"
          fi

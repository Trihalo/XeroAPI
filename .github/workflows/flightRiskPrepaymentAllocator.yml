name: FlightRisk Customer Prepayment AR Allocator

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Recipient name (for the results email)"
        required: true
      email:
        description: "Recipient email address"
        required: true
      dry_run:
        description: "Dry run (preview only, no payments allocated)"
        type: boolean
        default: false

jobs:
  fr-prepayment-allocator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r FlightRisk/requirements.txt

      - name: Run Customer Prepayment AR Allocator
        working-directory: FlightRisk
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          FLIGHT_RISK_CLIENT_ID: ${{ secrets.FLIGHT_RISK_CLIENT_ID }}
          FLIGHT_RISK_CLIENT_SECRET: ${{ secrets.FLIGHT_RISK_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN_FLIGHT_RISK: ${{ vars.XERO_REFRESH_TOKEN_FLIGHT_RISK }}
          EMAIL_SENDER_GMAIL: ${{ secrets.EMAIL_SENDER_GMAIL }}
          EMAIL_PASSWORD_GMAIL: ${{ secrets.EMAIL_PASSWORD_GMAIL }}
        run: |
          ARGS="--output-dir output"
          ARGS="$ARGS --name '${{ inputs.name }}' --email '${{ inputs.email }}'"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python CustomerPrepaymentARAllocator.py $ARGS

      - name: Send job summary to dashboard
        if: always()
        continue-on-error: true
        env:
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          python3 -c "
          import os, json, urllib.request
          url = os.environ.get('BACKEND_API_URL', '').strip()
          key = os.environ.get('BACKEND_API_KEY', '').strip()
          if not url or not key:
              print('BACKEND_API_URL or BACKEND_API_KEY not set, skipping.')
              exit(0)
          path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not path or not os.path.isfile(path):
              print('No GITHUB_STEP_SUMMARY file, skipping.')
              exit(0)
          with open(path) as f:
              summary = f.read().strip()
          if not summary:
              print('Summary is empty, skipping.')
              exit(0)
          payload = json.dumps({'run_id': int(os.environ['GITHUB_RUN_ID']), 'run_number': int(os.environ['GITHUB_RUN_NUMBER']), 'workflow_file': 'flightRiskPrepaymentAllocator.yml', 'summary': summary}).encode()
          req = urllib.request.Request(url + '/store-summary', data=payload, headers={'Content-Type': 'application/json', 'X-API-Key': key}, method='POST')
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          "

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prepayment-report-${{ github.run_number }}
          path: FlightRisk/output/
          retention-days: 30


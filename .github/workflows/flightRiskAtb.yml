name: Flight Risk ATB

on:
  schedule:
    - cron: '0 19 * * *'  # Daily at 7 PM UTC
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC / Workload Identity Federation
  contents: read

jobs:
  run-atb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.FLIGHT_RISK_WIF_PROVIDER }}
          service_account: ${{ vars.FLIGHT_RISK_WIF_SA }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r FlightRisk/requirements.txt

      - name: Run ATB script
        run: python FlightRisk/atbRequest.py
        env:
          FLIGHT_RISK_CLIENT_ID: ${{ secrets.FLIGHT_RISK_CLIENT_ID }}
          FLIGHT_RISK_CLIENT_SECRET: ${{ secrets.FLIGHT_RISK_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN_FLIGHT_RISK: ${{ vars.XERO_REFRESH_TOKEN_FLIGHT_RISK }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FLIGHT_RISK_BQ_PROJECT: ${{ vars.FLIGHT_RISK_BQ_PROJECT }}

      - name: Store summary
        if: always()
        run: |
          python3 -c "
import json, os, urllib.request
summary = open(os.environ['GITHUB_STEP_SUMMARY']).read().strip()
if not summary:
    print('No summary to store')
    exit(0)
payload = json.dumps({
    'run_id': int(os.environ.get('GITHUB_RUN_ID', 0)),
    'run_number': int(os.environ.get('GITHUB_RUN_NUMBER', 0)),
    'workflow_file': 'flightRiskAtb.yml',
    'summary': summary,
}).encode()
req = urllib.request.Request(
    os.environ['BACKEND_URL'] + '/store-summary',
    data=payload,
    headers={'Content-Type': 'application/json', 'X-API-Key': os.environ['BACKEND_API_KEY']},
    method='POST',
)
try:
    with urllib.request.urlopen(req, timeout=10) as resp:
        print('Summary stored:', resp.read().decode())
except Exception as e:
    print('Warning: Failed to store summary:', e)
"
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}

name: H2coco Supplier Payment Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  h2coco-supplier-payment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r H2coco/requirements.txt

      - name: Set up Google Cloud credentials
        run: |
          echo '${{ secrets.H2COCO_BQACCESS }}' > /tmp/key.json
          echo "H2COCO_BQACCESS=/tmp/key.json" >> $GITHUB_ENV
        shell: bash

      - name: Run H2coco Supplier Payment Allocation
        working-directory: H2coco
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          H2COCO_CLIENT_ID: ${{ secrets.H2COCO_CLIENT_ID }}
          H2COCO_CLIENT_SECRET: ${{ secrets.H2COCO_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN_H2COCO: ${{ vars.XERO_REFRESH_TOKEN_H2COCO }}
        run: |
          python supplierPrepayments.py

      - name: Store job summary
        if: always()
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          if [ -s "$GITHUB_STEP_SUMMARY" ] && [ -n "$BACKEND_URL" ]; then
            python3 -c "
import json, os, urllib.request
summary = open(os.environ['GITHUB_STEP_SUMMARY']).read().strip()
if not summary:
    print('No summary to store')
    exit(0)
payload = json.dumps({
    'run_id': int(os.environ.get('GITHUB_RUN_ID', 0)),
    'run_number': int(os.environ.get('GITHUB_RUN_NUMBER', 0)),
    'workflow_file': 'h2cocoSupplierPayment.yml',
    'summary': summary,
}).encode()
req = urllib.request.Request(
    os.environ['BACKEND_URL'] + '/store-summary',
    data=payload,
    headers={'Content-Type': 'application/json', 'X-API-Key': os.environ['BACKEND_API_KEY']},
    method='POST',
)
try:
    with urllib.request.urlopen(req, timeout=10) as resp:
        print('Summary stored:', resp.read().decode())
except Exception as e:
    print('Warning: Failed to store summary:', e)
"
          fi

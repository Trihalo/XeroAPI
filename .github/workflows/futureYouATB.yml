name: FutureYou ATB SQL Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  future-you-invoice-revenue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r FutureYou/requirements.txt

      - name: Set up Google Cloud credentials
        run: |
          echo '${{ secrets.BQACCESS }}' > /tmp/key.json
          echo "FUTUREYOU_BQACCESS=/tmp/key.json" >> $GITHUB_ENV
        shell: bash

      - name: Run FutureYou ATB BigQuery upload
        working-directory: FutureYou
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          FUTUREYOU_CONTRACTING_CLIENT_ID: ${{ secrets.FUTUREYOU_CONTRACTING_CLIENT_ID }}
          FUTUREYOU_CONTRACTING_CLIENT_SECRET: ${{ secrets.FUTUREYOU_CONTRACTING_CLIENT_SECRET }}
          FUTUREYOU_RECRUITMENT_CLIENT_ID: ${{ secrets.FUTUREYOU_RECRUITMENT_CLIENT_ID }}
          FUTUREYOU_RECRUITMENT_CLIENT_SECRET: ${{ secrets.FUTUREYOU_RECRUITMENT_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN_FUTUREYOU_CONTRACTING: ${{ vars.XERO_REFRESH_TOKEN_FUTUREYOU_CONTRACTING }}
          XERO_REFRESH_TOKEN_FUTUREYOU_RECRUITMENT: ${{ vars.XERO_REFRESH_TOKEN_FUTUREYOU_RECRUITMENT }}
        run: |
          python atbRequestv2.py

      - name: Send job summary to dashboard
        if: always()
        continue-on-error: true
        env:
          BACKEND_API_URL: ${{ vars.BACKEND_API_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          python3 -c "
          import os, json, urllib.request
          path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not path or not os.path.isfile(path):
              exit(0)
          with open(path) as f:
              summary = f.read().strip()
          if not summary:
              exit(0)
          payload = json.dumps({'run_id': int(os.environ['GITHUB_RUN_ID']), 'run_number': int(os.environ['GITHUB_RUN_NUMBER']), 'workflow_file': 'futureYouATB.yml', 'summary': summary}).encode()
          req = urllib.request.Request(os.environ['BACKEND_API_URL'] + '/store-summary', data=payload, headers={'Content-Type': 'application/json', 'X-API-Key': os.environ['BACKEND_API_KEY']}, method='POST')
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          "

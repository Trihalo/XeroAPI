name: H2coco Stale Prepayment Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 0"  # Monday 8am AEST (Sunday 22:00 UTC)

jobs:
  stale-prepayment-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r H2coco/requirements.txt

      - name: Set up Google Cloud credentials
        run: |
          echo '${{ secrets.H2DATASERVICES_BQACCESS }}' > /tmp/h2dataservices_key.json
          echo "H2DATASERVICES_BQACCESS=/tmp/h2dataservices_key.json" >> $GITHUB_ENV
        shell: bash

      - name: Run stale prepayment alert
        working-directory: H2coco
        env:
          EMAIL_SENDER_GMAIL: ${{ secrets.EMAIL_SENDER_GMAIL }}
          EMAIL_PASSWORD_GMAIL: ${{ secrets.EMAIL_PASSWORD_GMAIL }}
        run: |
          python stalePrepaymentAlert.py

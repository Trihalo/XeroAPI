<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legends Table — FutureYou</title>
  <style>
    html, body { margin: 0; padding: 0; background: #EEEEEE; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #111; }
    kbd { font-family: monospace; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js?v=3"></script>
  <script type="text/babel" src="LegendsTable.jsx?v=3"></script>
  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [tweaksVisible, setTweaksVisible] = React.useState(false);

      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e.data || typeof e.data !== "object") return;
          if (e.data.type === "__activate_edit_mode") setTweaksVisible(true);
          if (e.data.type === "__deactivate_edit_mode") setTweaksVisible(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const updateTweaks = (patch) => {
        setTweaks(prev => ({ ...prev, ...patch }));
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
      };

      return (
        <>
          <LegendsApp tweaks={tweaks} setTweaks={updateTweaks} />
          <TweaksPanel
            visible={tweaksVisible}
            density={tweaks.density}
            setDensity={(d) => updateTweaks({ density: d })}
            compareOn={true}
            setCompareOn={() => {}}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
